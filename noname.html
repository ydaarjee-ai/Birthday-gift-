<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 🎉</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow: hidden;
    }.container {
  position: relative;
  top: 50%;
  transform: translateY(-50%);
  padding: 20px;
}

h1 {
  font-size: 2.5em;
  color: #fff;
  margin-bottom: 10px;
}

p {
  font-size: 1.2em;
  color: #fff;
}

button {
  padding: 12px 20px;
  font-size: 1em;
  border: none;
  border-radius: 8px;
  background: #fff;
  color: #ff6f91;
  cursor: pointer;
  margin-top: 20px;
}

.anime-img {
  width: 90%;
  max-width: 300px;
  border-radius: 15px;
  margin-top: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}

@media (max-width: 600px) {
  h1 {
    font-size: 1.8em;
  }
  p {
    font-size: 1em;
  }
}

  </style>
</head>
<body><canvas id="confetti"></canvas>

  <div class="container">
    <h1>🎂 Happy Birthday! 🎉</h1>
    <p>Wishing you lots of happiness, fun, and amazing memories!</p><!-- Anime Birthday Image -->
<img class="anime-img" src="https://i.imgur.com/3ZQ3Z6D.png" alt="Anime Birthday">

<br>
<button onclick="startConfetti()">Celebrate 🎊</button>

  </div>  <script>
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    let pieces = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createPiece() {
      return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        size: Math.random() * 8 + 4,
        speed: Math.random() * 3 + 2,
        color: `hsl(${Math.random() * 360}, 100%, 50%)`
      };
    }

    function startConfetti() {
      pieces = [];
      for (let i = 0; i < 180; i++) {
        pieces.push(createPiece());
      }
      animate();
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        p.y += p.speed;
        if (p.y > canvas.height) {
          p.y = 0;
        }
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
      });
      requestAnimationFrame(animate);
    }
  </script></body>
</html>
